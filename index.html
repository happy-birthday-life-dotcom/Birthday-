<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Ayesha ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#ff4b91,#6a5cff);
font-family:Arial,sans-serif;
color:white;
text-align:center;
overflow:hidden;
}
.card{
background:rgba(255,255,255,.15);
padding:30px;
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 10px 30px rgba(0,0,0,.3);
max-width:350px;
}
h1{
font-size:2.2em;
}
p{
font-size:1.1em;
line-height:1.6;
}
button{
padding:12px 24px;
font-size:18px;
border:none;
border-radius:30px;
background:white;
color:#ff4b91;
cursor:pointer;
font-weight:bold;
}
</style>
</head>
<body>

<div class="card">
<h1>🎂 Happy Birthday Ayesha ❤️</h1>

<p>
Wishing you a day filled with happiness, laughter and beautiful memories.
May all your dreams come true. ✨
</p>

<button onclick="alert('Happy Birthday! 🎉 May Allah bless you with happiness, health and success. ❤️')">
Open Your Surprise 🎁
</button>

</div>

</body>
</html>
